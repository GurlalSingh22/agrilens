<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AgriLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root{--dark:#0f1f14;--green:#1a4731;--mid:#2d6a4f;--leaf:#52b788;--mint:#b7e4c7;--cream:#f8faf5;--gold:#d4a017;--white:#fff;--text:#1a2e22;--gray:#6b7280;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:linear-gradient(160deg,var(--dark) 0%,var(--green) 50%,var(--mid) 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;position:relative;overflow:hidden;}
    body::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%2352b788' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}
    .card{background:white;border-radius:28px;padding:2.5rem 2rem;width:100%;max-width:400px;position:relative;z-index:1;box-shadow:0 40px 80px rgba(0,0,0,0.3);}
    .brand{text-align:center;margin-bottom:2rem;}
    .brand-icon{width:56px;height:56px;background:#e8f5ee;border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 0.8rem;}
    .brand-icon i{color:var(--leaf);font-size:1.5rem;}
    .brand h2{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--dark);}
    .brand p{color:var(--gray);font-size:0.9rem;margin-top:0.2rem;}

    /* FORM */
    .form-group{margin-bottom:1.1rem;}
    label{display:block;font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--gray);margin-bottom:0.4rem;}
    .input-wrap{position:relative;}
    .input-wrap i{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:#aaa;font-size:0.9rem;}
    input[type=text],input[type=password],input[type=tel],select{width:100%;padding:0.9rem 1rem 0.9rem 2.8rem;border:1.5px solid #e5e7eb;border-radius:14px;font-size:0.95rem;font-family:'DM Sans',sans-serif;outline:none;background:#f8faf5;transition:border-color 0.2s;}
    input:focus,select:focus{border-color:var(--leaf);background:white;}
    select{-webkit-appearance:none;appearance:none;}
    .forgot{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.4rem;}
    .forgot a{font-size:0.8rem;color:var(--leaf);text-decoration:none;font-weight:600;}
    .btn{width:100%;background:var(--green);color:white;border:none;padding:1rem;border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.2s;margin-top:0.5rem;display:flex;align-items:center;justify-content:center;gap:0.5rem;}
    .btn:hover{background:var(--mid);}
    .divider{text-align:center;font-size:0.82rem;color:var(--gray);margin:1.2rem 0;position:relative;}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:#e5e7eb;}
    .divider::before{left:0;} .divider::after{right:0;}
    .switch-link{text-align:center;font-size:0.88rem;color:var(--gray);margin-top:1.2rem;}
    .switch-link a{color:var(--leaf);font-weight:700;text-decoration:none;}
    .switch-link a:hover{text-decoration:underline;}
    .back-link{text-align:center;margin-top:1.5rem;position:relative;z-index:1;}
    .back-link a{color:rgba(255,255,255,0.5);text-decoration:none;font-size:0.85rem;transition:color 0.2s;}
    .back-link a:hover{color:var(--leaf);}

    /* OTP MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity 0.3s;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal{background:white;border-radius:24px;padding:2rem;width:100%;max-width:340px;text-align:center;transform:scale(0.9);transition:transform 0.3s;}
    .modal-overlay.open .modal{transform:scale(1);}
    .modal h3{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--dark);margin-bottom:0.4rem;}
    .modal p{color:var(--gray);font-size:0.88rem;margin-bottom:1.5rem;}
    .otp-input{width:100%;padding:1rem;border:2px solid #e5e7eb;border-radius:14px;text-align:center;font-size:2rem;letter-spacing:0.5em;font-weight:700;outline:none;font-family:'DM Sans',sans-serif;transition:border-color 0.2s;}
    .otp-input:focus{border-color:var(--leaf);}
    .otp-hint{font-size:0.75rem;color:var(--gray);margin:0.6rem 0 1.2rem;}
    .modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;}
    .btn-cancel{padding:0.85rem;border:1.5px solid #e5e7eb;border-radius:12px;background:white;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--gray);}
    .btn-verify{padding:0.85rem;border:none;border-radius:12px;background:var(--green);color:white;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}

    /* TOAST */
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--dark);color:white;padding:0.8rem 1.8rem;border-radius:999px;font-size:0.88rem;font-weight:600;z-index:500;display:none;align-items:center;gap:0.5rem;box-shadow:0 8px 30px rgba(0,0,0,0.3);}
    .toast.show{display:flex;animation:toastAnim 0.3s ease;}
    @keyframes toastAnim{from{opacity:0;transform:translateX(-50%) translateY(12px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

    .panel{display:none;} .panel.active{display:block;}
  </style>
</head>
<body>

<div class="card" id="loginCard">
  <div class="brand">
    <div class="brand-icon"><i class="fa-solid fa-seedling"></i></div>
    <h2>AgriLens</h2>
    <p>Login to your account</p>
  </div>
  <div class="form-group">
    <label>Mobile Number</label>
    <div class="input-wrap"><i class="fa-solid fa-phone"></i>
      <input type="tel" id="loginPhone" placeholder="9876543210">
    </div>
  </div>
  <div class="form-group">
    <div class="forgot">
      <label style="margin:0;">Password</label>
      <a href="#" onclick="showForgot()">Forgot Password?</a>
    </div>
    <div class="input-wrap"><i class="fa-solid fa-lock"></i>
      <input type="password" id="loginPass" placeholder="••••••••">
    </div>
  </div>
  <button class="btn" onclick="doLogin()">Login <i class="fa-solid fa-arrow-right"></i></button>
  <div class="switch-link">Don't have an account? <a href="register.html">Register</a></div>
</div>

<div class="back-link"><a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Home</a></div>

<!-- OTP MODAL -->
<div class="modal-overlay" id="otpModal">
  <div class="modal">
    <h3>Verify OTP</h3>
    <p>Enter the 6-digit code sent to your phone</p>
    <input class="otp-input" type="text" id="otpInput" maxlength="6" placeholder="000000">
    <div class="otp-hint">Demo OTP: <strong>123456</strong></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeOTP()">Cancel</button>
      <button class="btn-verify" onclick="verifyOTP()">Verify</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function doLogin() {
  const phone = document.getElementById('loginPhone').value;
  const pass = document.getElementById('loginPass').value;
  if (!phone || !pass) { showToast('⚠️ Please fill in all fields'); return; }
  if (phone === '0000000000' && pass === 'admin') {
    showToast('✅ Admin login successful!');
    setTimeout(() => window.location = 'admin.html', 1200);
  } else if (phone.length >= 10 && pass.length >= 4) {
    showToast('✅ Login successful! Redirecting...');
    setTimeout(() => window.location = 'index.html', 1200);
  } else {
    showToast('❌ Invalid phone or password');
  }
}

function showForgot() { showToast('📱 OTP reset feature coming soon'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
