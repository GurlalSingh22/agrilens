<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace — AgriLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --dark:#0f1f14;--green:#1a4731;--mid:#2d6a4f;--leaf:#52b788;--mint:#b7e4c7;
      --cream:#f8faf5;--gold:#d4a017;--white:#ffffff;--text:#1a2e22;--muted:#5a7a66;--gray:#6b7280;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);}
    h1,h2,h3{font-family:'Playfair Display',serif;}

    nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.9);backdrop-filter:blur(16px);border-bottom:1px solid #e5e7eb;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:68px;}
    .nav-brand{display:flex;align-items:center;gap:8px;text-decoration:none;}
    .nav-brand i{color:var(--leaf);font-size:1.4rem;}
    .nav-brand span{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--green);font-weight:900;}
    .nav-links{display:flex;align-items:center;gap:2rem;}
    .nav-links a{text-decoration:none;color:var(--text);font-weight:500;font-size:0.95rem;transition:color 0.2s;}
    .nav-links a:hover,.nav-links a.active{color:var(--leaf);}
    .btn-nav{background:var(--green);color:white!important;padding:0.5rem 1.4rem;border-radius:999px;font-weight:600!important;}
    .hamburger{display:none;background:none;border:none;cursor:pointer;font-size:1.4rem;color:var(--text);}
    .mobile-menu{display:none;position:fixed;inset:0;top:68px;background:white;z-index:99;padding:2rem;flex-direction:column;gap:1.5rem;}
    .mobile-menu.open{display:flex;}
    .mobile-menu a{font-size:1.1rem;font-weight:600;text-decoration:none;color:var(--text);padding:0.8rem 0;border-bottom:1px solid #f0f0f0;}

    /* HEADER */
    .page-header{background:linear-gradient(135deg,var(--green),var(--mid));color:white;padding:3rem 2rem 4rem;text-align:center;position:relative;overflow:hidden;}
    .page-header::before{content:'';position:absolute;top:-40%;right:-10%;width:400px;height:400px;background:rgba(255,255,255,0.04);border-radius:50%;}
    .page-header h1{font-size:2.5rem;margin-bottom:0.5rem;}
    .page-header p{color:rgba(255,255,255,0.7);font-size:1rem;}

    /* SEARCH + FILTER BAR */
    .search-bar{background:white;padding:1.5rem 2rem;border-bottom:1px solid #e8f5ee;position:sticky;top:68px;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
    .search-inner{max-width:1200px;margin:0 auto;display:flex;gap:1rem;align-items:center;flex-wrap:wrap;}
    .search-wrap{position:relative;flex:1;min-width:200px;}
    .search-wrap i{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--gray);}
    .search-wrap input{width:100%;padding:0.85rem 1rem 0.85rem 2.8rem;border:1.5px solid #e5e7eb;border-radius:14px;font-size:0.95rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;}
    .search-wrap input:focus{border-color:var(--leaf);}
    .filter-btns{display:flex;gap:0.5rem;flex-wrap:wrap;}
    .filter-btn{padding:0.6rem 1.1rem;border:1.5px solid #e5e7eb;border-radius:999px;background:white;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;color:var(--text);}
    .filter-btn:hover,.filter-btn.active{background:var(--leaf);color:white;border-color:var(--leaf);}

    /* CROPS GRID */
    .grid-section{max-width:1200px;margin:2.5rem auto;padding:0 2rem 4rem;}
    .grid-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
    .grid-header h2{font-size:1.4rem;color:var(--dark);}
    .result-count{font-size:0.85rem;color:var(--gray);background:#f0f0f0;padding:0.35rem 0.9rem;border-radius:999px;}
    .crops-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem;}
    .crop-card{background:white;border-radius:20px;overflow:hidden;border:1px solid #e8f5ee;transition:transform 0.3s,box-shadow 0.3s;cursor:pointer;}
    .crop-card:hover{transform:translateY(-5px);box-shadow:0 20px 60px rgba(45,106,79,0.13);}
    .crop-img{width:100%;height:200px;object-fit:cover;background:#e8f5ee;display:flex;align-items:center;justify-content:center;font-size:4rem;}
    .crop-img-placeholder{width:100%;height:200px;background:linear-gradient(135deg,#e8f5ee,#d0ead8);display:flex;align-items:center;justify-content:center;font-size:3.5rem;}
    .crop-body{padding:1.4rem;}
    .crop-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.5rem;}
    .crop-name{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--dark);}
    .crop-price{background:#e8f5ee;color:var(--mid);font-size:0.8rem;font-weight:700;padding:0.35rem 0.8rem;border-radius:999px;white-space:nowrap;}
    .crop-location{color:var(--gray);font-size:0.85rem;margin-bottom:1rem;}
    .crop-location i{margin-right:4px;}
    .crop-footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid #f0f0f0;padding-top:1rem;}
    .crop-farmer{display:flex;align-items:center;gap:0.6rem;}
    .farmer-avatar{width:34px;height:34px;background:#e8f5ee;border-radius:50%;display:flex;align-items:center;justify-content:center;}
    .farmer-avatar i{color:var(--mid);font-size:0.85rem;}
    .farmer-name{font-size:0.82rem;font-weight:600;color:var(--text);}
    .btn-view{background:var(--green);color:white;padding:0.5rem 1.2rem;border-radius:12px;font-size:0.82rem;font-weight:700;text-decoration:none;transition:background 0.2s;}
    .btn-view:hover{background:var(--mid);}

    /* CROP DETAIL MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal{background:white;border-radius:28px 28px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);}
    .modal-overlay.open .modal{transform:translateY(0);}
    .modal-img{width:100%;height:260px;background:linear-gradient(135deg,#e8f5ee,#d0ead8);display:flex;align-items:center;justify-content:center;font-size:5rem;position:relative;}
    .modal-back{position:absolute;top:1rem;left:1rem;background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;font-size:1rem;color:var(--text);}
    .modal-body{padding:1.8rem;}
    .modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.8rem;}
    .modal-name{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--dark);}
    .modal-price{background:var(--green);color:white;font-size:0.9rem;font-weight:700;padding:0.5rem 1rem;border-radius:14px;}
    .modal-meta{display:flex;gap:1.5rem;color:var(--gray);font-size:0.88rem;margin-bottom:1.5rem;}
    .modal-desc{color:var(--gray);line-height:1.7;margin-bottom:1.5rem;font-size:0.95rem;}
    .modal-seller{background:#f8faf5;border-radius:16px;padding:1rem 1.2rem;display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;}
    .seller-big-avatar{width:48px;height:48px;background:#e8f5ee;border-radius:50%;display:flex;align-items:center;justify-content:center;}
    .seller-big-avatar i{color:var(--mid);font-size:1.2rem;}
    .seller-label{font-size:0.75rem;color:var(--gray);text-transform:uppercase;font-weight:700;}
    .seller-bname{font-weight:700;color:var(--dark);}
    .btn-whatsapp{width:100%;background:#25d366;color:white;border:none;padding:1.1rem;border-radius:16px;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.6rem;transition:background 0.2s;font-family:'DM Sans',sans-serif;}
    .btn-whatsapp:hover{background:#22c55e;}

    /* ADD CROP FAB */
    .fab{position:fixed;bottom:2rem;right:2rem;background:var(--leaf);color:var(--dark);width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 30px rgba(82,183,136,0.5);text-decoration:none;font-size:1.5rem;transition:transform 0.2s;z-index:50;}
    .fab:hover{transform:scale(1.1);}
    .fab-tooltip{position:absolute;right:70px;white-space:nowrap;background:var(--dark);color:white;padding:0.4rem 0.9rem;border-radius:999px;font-size:0.8rem;font-weight:600;opacity:0;pointer-events:none;transition:opacity 0.2s;}
    .fab:hover .fab-tooltip{opacity:1;}

    footer{background:var(--dark);color:rgba(255,255,255,0.5);padding:2.5rem 2rem;text-align:center;}
    footer .brand{font-family:'Playfair Display',serif;color:var(--leaf);font-size:1.4rem;font-weight:900;}
    footer .copy{font-size:0.8rem;margin-top:0.5rem;}

    @media(max-width:768px){.nav-links{display:none;}.hamburger{display:block;}.crops-grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand"><i class="fa-solid fa-seedling"></i><span>AgriLens</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="marketplace.html" class="active">Marketplace</a>
    <a href="soil.html">Soil Intelligence</a>
    <a href="login.html" class="btn-nav">Login</a>
  </div>
  <button class="hamburger" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html">Home</a>
  <a href="marketplace.html">Marketplace</a>
  <a href="soil.html">Soil Intelligence</a>
  <a href="login.html" style="color:var(--leaf);">Login</a>
</div>

<div class="page-header">
  <h1><i class="fa-solid fa-store" style="font-size:1.8rem;margin-right:0.5rem;"></i> Marketplace</h1>
  <p>Buy fresh produce directly from farmers — no middlemen, fair prices</p>
</div>

<div class="search-bar">
  <div class="search-inner">
    <div class="search-wrap">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchInput" placeholder="Search crops (Wheat, Rice, Mustard...)" oninput="filterCrops()">
    </div>
    <div class="filter-btns">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('grain',this)">Grains</button>
      <button class="filter-btn" onclick="setFilter('vegetable',this)">Vegetables</button>
      <button class="filter-btn" onclick="setFilter('fruit',this)">Fruits</button>
      <button class="filter-btn" onclick="setFilter('pulse',this)">Pulses</button>
    </div>
  </div>
</div>

<div class="grid-section">
  <div class="grid-header">
    <h2>Fresh Listings</h2>
    <span class="result-count" id="resultCount">12 crops found</span>
  </div>
  <div class="crops-grid" id="cropsGrid"></div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-img" id="modalImg"></div>
    <div class="modal-body">
      <div class="modal-header">
        <h2 class="modal-name" id="modalName"></h2>
        <span class="modal-price" id="modalPrice"></span>
      </div>
      <div class="modal-meta">
        <span><i class="fa-solid fa-location-dot"></i> <span id="modalLocation"></span></span>
        <span><i class="fa-solid fa-box"></i> <span id="modalQty"></span></span>
      </div>
      <p class="modal-desc" id="modalDesc"></p>
      <div class="modal-seller">
        <div class="seller-big-avatar"><i class="fa-solid fa-user"></i></div>
        <div>
          <div class="seller-label">Seller</div>
          <div class="seller-bname" id="modalFarmer"></div>
        </div>
      </div>
      <button class="btn-whatsapp" id="modalWA" onclick="contactFarmer()">
        <i class="fa-brands fa-whatsapp" style="font-size:1.3rem;"></i> Contact Farmer on WhatsApp
      </button>
    </div>
  </div>
</div>

<a href="add_crop.html" class="fab" title="List My Crop">
  <span class="fab-tooltip">List My Crop</span>
  <i class="fa-solid fa-plus"></i>
</a>

<footer>
  <div class="brand"><i class="fa-solid fa-seedling"></i> AgriLens</div>
  <div class="copy">© 2025 AgriLens · Direct Farm-to-Buyer Platform</div>
</footer>

<script>
const CROPS = [
  {id:1,name:"Basmati Rice",category:"grain",emoji:"🌾",price:2400,location:"Amritsar, Punjab",qty:"120 Quintals",farmer:"Gurpreet Singh",phone:"9876543210",desc:"Premium long-grain aromatic basmati rice. Freshly harvested, zero pesticides. Direct from farm. Available for bulk buyers too."},
  {id:2,name:"Wheat (Sharbati)",category:"grain",emoji:"🌾",price:2100,location:"Ludhiana, Punjab",qty:"200 Quintals",farmer:"Harjinder Kaur",phone:"9812345678",desc:"Top-quality Sharbati wheat, high protein content. Ideal for atta and flour mills. Stored in clean dry conditions."},
  {id:3,name:"Mustard (Sarson)",category:"grain",emoji:"🟡",price:5500,location:"Bathinda, Punjab",qty:"80 Quintals",farmer:"Rajvir Dhaliwal",phone:"9898989898",desc:"Cold-pressed quality mustard seeds. Rich oil content above 38%. Perfect for oil extraction or direct use."},
  {id:4,name:"Fresh Tomatoes",category:"vegetable",emoji:"🍅",price:800,location:"Patiala, Punjab",qty:"50 Quintals",farmer:"Sukhwinder Mann",phone:"9911223344",desc:"Vine-ripened Roma tomatoes, firm and bright red. Ideal for restaurants, hotels, and vegetable wholesalers."},
  {id:5,name:"Onion (Pyaaz)",category:"vegetable",emoji:"🧅",price:1200,location:"Jalandhar, Punjab",qty:"300 Quintals",farmer:"Manpreet Gill",phone:"9855667788",desc:"Dry red onions, fully cured and ready for storage. Medium to large size, strong flavour. Storage tested."},
  {id:6,name:"Potato (Aloo)",category:"vegetable",emoji:"🥔",price:600,location:"Hoshiarpur, Punjab",qty:"500 Quintals",farmer:"Balwant Rana",phone:"9765432109",desc:"Fresh white potatoes from Hoshiarpur highlands. Clean, no rot, ideal for chips, restaurants, and retail."},
  {id:7,name:"Alphonso Mangoes",category:"fruit",emoji:"🥭",price:12000,location:"Kapurthala, Punjab",qty:"20 Quintals",farmer:"Daljeet Brar",phone:"9878787878",desc:"Premium Alphonso mango variety. Sweet, fibre-free, golden pulp. Pre-order available. Limited stock."},
  {id:8,name:"Kinnow (Mandarin)",category:"fruit",emoji:"🍊",price:1800,location:"Abohar, Punjab",qty:"150 Quintals",farmer:"Ranjit Sidhu",phone:"9814141414",desc:"Juicy Abohar kinnow, high Brix rating. Export quality available. Pesticide residue certificate provided."},
  {id:9,name:"Moong Dal (Lentils)",category:"pulse",emoji:"🫘",price:7200,location:"Fazilka, Punjab",qty:"40 Quintals",farmer:"Kulwant Cheema",phone:"9831313131",desc:"Machine-cleaned split moong dal. Green gram, fresh stock from Rabi season. No adulteration, direct supply."},
  {id:10,name:"Chana (Chickpeas)",category:"pulse",emoji:"🫘",price:5800,location:"Muktsar, Punjab",qty:"60 Quintals",farmer:"Parminder Sekhon",phone:"9845454545",desc:"Bold chickpeas, uniform size and colour. Kabuli variety available. Ideal for dal, chana masala, and export."},
  {id:11,name:"Maize (Makki)",category:"grain",emoji:"🌽",price:1950,location:"Ropar, Punjab",qty:"180 Quintals",farmer:"Amarjit Sohal",phone:"9867676767",desc:"Hybrid maize, high yield variety. Moisture below 14%. Used for animal feed, flour, and starch industry."},
  {id:12,name:"Green Peas (Matar)",category:"vegetable",emoji:"🫛",price:2200,location:"Gurdaspur, Punjab",qty:"30 Quintals",farmer:"Navneet Randhawa",phone:"9856565656",desc:"Fresh tender green peas from Gurdaspur. Sweet, plump pods. Great for direct consumption or freezing."},
];

let currentFilter = 'all';
let currentCrop = null;

function renderCrops(list) {
  const grid = document.getElementById('cropsGrid');
  document.getElementById('resultCount').textContent = `${list.length} crops found`;
  if (list.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:4rem;color:var(--gray)"><i class="fa-solid fa-seedling" style="font-size:3rem;opacity:0.3;display:block;margin-bottom:1rem;"></i><p>No crops match your search.</p></div>`;
    return;
  }
  grid.innerHTML = list.map(c => `
    <div class="crop-card" onclick="openModal(${c.id})">
      <div class="crop-img-placeholder" style="font-size:4rem;">${c.emoji}</div>
      <div class="crop-body">
        <div class="crop-top">
          <h3 class="crop-name">${c.name}</h3>
          <span class="crop-price">₹${c.price.toLocaleString()}/Qtl</span>
        </div>
        <p class="crop-location"><i class="fa-solid fa-location-dot"></i> ${c.location}</p>
        <div class="crop-footer">
          <div class="crop-farmer">
            <div class="farmer-avatar"><i class="fa-solid fa-user"></i></div>
            <span class="farmer-name">${c.farmer}</span>
          </div>
          <span class="btn-view">View Details</span>
        </div>
      </div>
    </div>
  `).join('');
}

function filterCrops() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const list = CROPS.filter(c => {
    const matchFilter = currentFilter === 'all' || c.category === currentFilter;
    const matchSearch = c.name.toLowerCase().includes(q) || c.location.toLowerCase().includes(q) || c.farmer.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });
  renderCrops(list);
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCrops();
}

function openModal(id) {
  const c = CROPS.find(x => x.id === id);
  if (!c) return;
  currentCrop = c;
  document.getElementById('modalImg').innerHTML = `<button class="modal-back" onclick="closeModal()"><i class="fa-solid fa-arrow-left"></i></button><span style="font-size:5rem">${c.emoji}</span>`;
  document.getElementById('modalName').textContent = c.name;
  document.getElementById('modalPrice').textContent = `₹${c.price.toLocaleString()}/Quintal`;
  document.getElementById('modalLocation').textContent = c.location;
  document.getElementById('modalQty').textContent = c.qty;
  document.getElementById('modalDesc').textContent = c.desc;
  document.getElementById('modalFarmer').textContent = c.farmer;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay') && !e.target.classList.contains('modal-back')) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function contactFarmer() {
  if (!currentCrop) return;
  const msg = encodeURIComponent(`Hello, I am interested in your ${currentCrop.name} listed on AgriLens. Can we discuss?`);
  window.open(`https://wa.me/91${currentCrop.phone}?text=${msg}`, '_blank');
}

function toggleMenu() {
  document.getElementById('mobileMenu').classList.toggle('open');
}

renderCrops(CROPS);
</script>
</body>
</html>
