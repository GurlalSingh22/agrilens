<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — AgriLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root{--dark:#0f1f14;--green:#1a4731;--mid:#2d6a4f;--leaf:#52b788;--mint:#b7e4c7;--cream:#f8faf5;--gold:#d4a017;--white:#fff;--text:#1a2e22;--gray:#6b7280;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:linear-gradient(160deg,var(--dark) 0%,var(--green) 60%,var(--mid) 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;position:relative;overflow:hidden;}
    body::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%2352b788' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}
    .card{background:white;border-radius:28px;padding:2.5rem 2rem;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 40px 80px rgba(0,0,0,0.3);}
    .brand{text-align:center;margin-bottom:2rem;}
    .brand-icon{width:56px;height:56px;background:#e8f5ee;border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 0.8rem;}
    .brand-icon i{color:var(--leaf);font-size:1.5rem;}
    .brand h2{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--dark);}
    .brand p{color:var(--gray);font-size:0.9rem;margin-top:0.2rem;}
    .form-group{margin-bottom:1.1rem;}
    label{display:block;font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--gray);margin-bottom:0.4rem;}
    .input-wrap{position:relative;}
    .input-wrap i.icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:#aaa;font-size:0.9rem;}
    input[type=text],input[type=password],input[type=tel],select{width:100%;padding:0.9rem 1rem 0.9rem 2.8rem;border:1.5px solid #e5e7eb;border-radius:14px;font-size:0.95rem;font-family:'DM Sans',sans-serif;outline:none;background:#f8faf5;transition:border-color 0.2s;}
    input:focus,select:focus{border-color:var(--leaf);background:white;}
    select{-webkit-appearance:none;appearance:none;}
    /* ROLE CARDS */
    .role-selector{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;margin-top:0.4rem;}
    .role-card{border:2px solid #e5e7eb;border-radius:14px;padding:1rem;cursor:pointer;text-align:center;transition:all 0.2s;background:#f8faf5;}
    .role-card:hover{border-color:var(--leaf);}
    .role-card.selected{border-color:var(--leaf);background:#f0faf4;}
    .role-card i{font-size:1.6rem;margin-bottom:0.4rem;display:block;color:var(--mid);}
    .role-card .role-name{font-weight:700;font-size:0.9rem;color:var(--dark);}
    .role-card .role-sub{font-size:0.75rem;color:var(--gray);margin-top:0.1rem;}
    .btn{width:100%;background:var(--green);color:white;border:none;padding:1rem;border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.2s;margin-top:0.8rem;display:flex;align-items:center;justify-content:center;gap:0.5rem;}
    .btn:hover{background:var(--mid);}
    .switch-link{text-align:center;font-size:0.88rem;color:var(--gray);margin-top:1.2rem;}
    .switch-link a{color:var(--leaf);font-weight:700;text-decoration:none;}
    .back-link{text-align:center;margin-top:1.5rem;position:relative;z-index:1;}
    .back-link a{color:rgba(255,255,255,0.5);text-decoration:none;font-size:0.85rem;}
    .back-link a:hover{color:var(--leaf);}
    /* OTP MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity 0.3s;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal{background:white;border-radius:24px;padding:2rem;width:100%;max-width:340px;text-align:center;transform:scale(0.9);transition:transform 0.3s;}
    .modal-overlay.open .modal{transform:scale(1);}
    .modal h3{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--dark);margin-bottom:0.4rem;}
    .modal p{color:var(--gray);font-size:0.88rem;margin-bottom:1.5rem;}
    .otp-input{width:100%;padding:1rem;border:2px solid #e5e7eb;border-radius:14px;text-align:center;font-size:2rem;letter-spacing:0.5em;font-weight:700;outline:none;font-family:'DM Sans',sans-serif;transition:border-color 0.2s;}
    .otp-input:focus{border-color:var(--leaf);}
    .otp-hint{font-size:0.75rem;color:var(--gray);margin:0.6rem 0 1.2rem;}
    .modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;}
    .btn-cancel{padding:0.85rem;border:1.5px solid #e5e7eb;border-radius:12px;background:white;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--gray);}
    .btn-verify{padding:0.85rem;border:none;border-radius:12px;background:var(--green);color:white;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
    /* SUCCESS */
    .success-state{text-align:center;padding:1rem 0;}
    .success-icon{width:80px;height:80px;background:#e8f5ee;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;font-size:2rem;color:var(--leaf);}
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--dark);color:white;padding:0.8rem 1.8rem;border-radius:999px;font-size:0.88rem;font-weight:600;z-index:500;display:none;align-items:center;gap:0.5rem;}
    .toast.show{display:flex;}
  </style>
</head>
<body>

<div class="card" id="regCard">
  <div class="brand">
    <div class="brand-icon"><i class="fa-solid fa-seedling"></i></div>
    <h2>AgriLens</h2>
    <p>Create your free account</p>
  </div>

  <div class="form-group">
    <label>Full Name</label>
    <div class="input-wrap"><i class="fa-solid fa-user icon"></i>
      <input type="text" id="regName" placeholder="Gurpreet Singh">
    </div>
  </div>

  <div class="form-group">
    <label>Mobile Number</label>
    <div class="input-wrap"><i class="fa-solid fa-phone icon"></i>
      <input type="tel" id="regPhone" placeholder="9876543210" maxlength="10">
    </div>
  </div>

  <div class="form-group">
    <label>I am a</label>
    <div class="role-selector">
      <div class="role-card selected" id="roleFarmer" onclick="selectRole('farmer')">
        <i class="fa-solid fa-tractor"></i>
        <div class="role-name">Farmer</div>
        <div class="role-sub">Sell my crops</div>
      </div>
      <div class="role-card" id="roleBuyer" onclick="selectRole('buyer')">
        <i class="fa-solid fa-shopping-basket"></i>
        <div class="role-name">Buyer</div>
        <div class="role-sub">Buy produce</div>
      </div>
    </div>
  </div>

  <div class="form-group">
    <label>Password</label>
    <div class="input-wrap"><i class="fa-solid fa-lock icon"></i>
      <input type="password" id="regPass" placeholder="Min 6 characters">
    </div>
  </div>

  <button class="btn" onclick="showOTP()">
    Verify & Register <i class="fa-solid fa-shield-check"></i>
  </button>
  <div class="switch-link">Already have an account? <a href="login.html">Login</a></div>
</div>

<div class="back-link"><a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Home</a></div>

<!-- OTP MODAL -->
<div class="modal-overlay" id="otpModal">
  <div class="modal">
    <h3>Verify Phone</h3>
    <p>Enter the 6-digit code sent to your number</p>
    <input class="otp-input" type="text" id="otpInput" maxlength="6" placeholder="000000">
    <div class="otp-hint">Demo OTP: <strong>123456</strong></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeOTP()">Cancel</button>
      <button class="btn-verify" onclick="verifyOTP()">Verify</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let selectedRole = 'farmer';

function selectRole(r) {
  selectedRole = r;
  document.getElementById('roleFarmer').classList.toggle('selected', r === 'farmer');
  document.getElementById('roleBuyer').classList.toggle('selected', r === 'buyer');
}

function showOTP() {
  const name = document.getElementById('regName').value;
  const phone = document.getElementById('regPhone').value;
  const pass = document.getElementById('regPass').value;
  if (!name || !phone || !pass) { showToast('⚠️ Please fill in all fields'); return; }
  if (phone.length < 10) { showToast('⚠️ Enter a valid 10-digit mobile number'); return; }
  if (pass.length < 6) { showToast('⚠️ Password must be at least 6 characters'); return; }
  document.getElementById('otpModal').classList.add('open');
}

function closeOTP() { document.getElementById('otpModal').classList.remove('open'); }

function verifyOTP() {
  const otp = document.getElementById('otpInput').value;
  if (otp === '123456') {
    closeOTP();
    showToast('✅ Registration successful! Redirecting to login...');
    setTimeout(() => window.location = 'login.html', 2000);
  } else {
    showToast('❌ Invalid OTP. Demo code is 123456');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
